name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Typecheck & Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: ["20.x", "22.x"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npm run typecheck

      - name: Unit tests with coverage
        run: npm run test:coverage
        env:
          # Minimal env required for config validation to pass in tests.
          # Real secrets are not needed; live integration tests are opt-in.
          ANTHROPIC_API_KEY: sk-ant-test-placeholder
          PRIVY_APP_ID: test-privy-app-id
          PRIVY_APP_SECRET: test-privy-app-secret
          BASE_RPC_URL: https://sepolia.base.org
          NODE_ENV: test

      - name: Enforce coverage gates
        run: npm run coverage:gate

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: matrix.node-version == '20.x'
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  contracts:
    name: Solidity Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Install forge dependencies
        working-directory: contracts
        run: forge install

      - name: Build contracts
        working-directory: contracts
        run: forge build --sizes

      - name: Run Solidity tests
        working-directory: contracts
        run: forge test -vvv

      - name: Check gas snapshots
        working-directory: contracts
        run: forge snapshot --check
        continue-on-error: true

  integration-smoke:
    name: Integration Smoke (Protected)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    needs: test
    environment: integration-smoke

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate integration secrets
        shell: bash
        env:
          BASE_RPC_URL: ${{ secrets.BASE_RPC_URL }}
          PRIVY_APP_ID: ${{ secrets.PRIVY_APP_ID }}
          PRIVY_APP_SECRET: ${{ secrets.PRIVY_APP_SECRET }}
          ERC8004_REGISTRY_ADDRESS: ${{ secrets.ERC8004_REGISTRY_ADDRESS }}
          SAFE_ESCROW_ADDRESS: ${{ secrets.SAFE_ESCROW_ADDRESS }}
          TASK_AUTH_SHARED_SECRET: ${{ secrets.TASK_AUTH_SHARED_SECRET }}
        run: |
          for key in BASE_RPC_URL PRIVY_APP_ID PRIVY_APP_SECRET ERC8004_REGISTRY_ADDRESS SAFE_ESCROW_ADDRESS TASK_AUTH_SHARED_SECRET; do
            if [ -z "${!key}" ]; then
              echo "Missing required secret: $key"
              exit 1
            fi
          done

      - name: Run live integration smoke test
        env:
          RUN_LIVE_INTEGRATION: "1"
          NODE_ENV: production
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BASE_RPC_URL: ${{ secrets.BASE_RPC_URL }}
          PRIVY_APP_ID: ${{ secrets.PRIVY_APP_ID }}
          PRIVY_APP_SECRET: ${{ secrets.PRIVY_APP_SECRET }}
          ERC8004_REGISTRY_ADDRESS: ${{ secrets.ERC8004_REGISTRY_ADDRESS }}
          SAFE_ESCROW_ADDRESS: ${{ secrets.SAFE_ESCROW_ADDRESS }}
          TASK_AUTH_REQUIRED: "true"
          TASK_AUTH_SHARED_SECRET: ${{ secrets.TASK_AUTH_SHARED_SECRET }}
        run: npm run test:integration

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check formatting (TypeScript)
        run: npx tsc --noEmit
